<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampaignTrailMojo</title>
    <link rel="stylesheet" type="text/css" href="../style.css">
    <style>
        .blog-shell {
            max-width: 1200px;
            margin: 0 auto;
        }

        .blog-intro {
            margin-bottom: 16px;
            color: #2f2f4f;
        }

        .tab-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 14px;
        }

        .tab-button {
            background-color: #333366;
            color: white;
            border: 1px solid #222244;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 14px;
        }

        .tab-button:hover {
            background-color: #555588;
        }

        .tab-button.active {
            background-color: #f4f4f4;
            color: #333366;
            border-color: #333366;
            font-weight: bold;
        }

        .tab-button:focus-visible {
            outline: 2px solid #333366;
            outline-offset: 1px;
        }

        .reader-card {
            border: 1px solid #cfd4df;
            background: white;
            border-radius: 8px;
            padding: 18px;
        }

        #post-title {
            margin-top: 0;
            margin-bottom: 14px;
            color: #333366;
            border-bottom: 2px solid #333366;
            padding-bottom: 6px;
        }

        #post-content {
            line-height: 1.5;
        }

        #post-content .blog {
            margin-left: 0;
            margin-right: 0;
        }

        .loading-text {
            color: #666;
            font-style: italic;
        }

        @media (max-width: 768px) {
            .tab-button {
                font-size: 13px;
                padding: 7px 10px;
            }

            .reader-card {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="unique-banner-container">
        <img src="../static/images/CampaignTrailMojo.png" alt="Site Banner" class="site-banner">
    </div>
    <div class="main-container">
    <div class="blog-shell">
     <h1>CYOA Blog</h1>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
  <div class="container-fluid">
        <ul class="navbar">
          <li><a href="/">Total</a></li>
          <li><a href="/recent">Recent</a></li>
          <li><a href="/by_day">By Day</a></li>
          <li><a href="/by_week">By Week</a></li>
          <li><a href="/by_month">By Month</a></li>
          <li><a href="/graphs">Graphs</a></li>
          <li><a href="/blog">Blog</a></li>
        </ul>
  </div>
</nav>
    <p class="blog-intro">All CYOA blog posts are now available in one page. Pick a tab to load the post.</p>

    <div id="tab-bar" class="tab-bar" role="tablist" aria-label="CYOA blog posts"></div>

    <div class="reader-card">
        <h2 id="post-title">Choose a post</h2>
        <div id="post-content" class="loading-text">Loading post content...</div>
    </div>

    <noscript>
        <p>JavaScript is required for the one-page reader. You can still open the individual pages:</p>
        <ul>
            <li><a href="./post1/">1) Welcome and Tooltips</a></li>
            <li><a href="./post2/">2) What even is CYOA?</a></li>
            <li><a href="./post3/">3) CYOA: Making the right stuff happen</a></li>
            <li><a href="./post4/">4) campaignTrail_temp and you</a></li>
            <li><a href="./post5/">5) Candidate Switching with CYOA</a></li>
            <li><a href="./post6/">6) VPs and how to use them</a></li>
            <li><a href="./post8/">8) CYOA Helper Functions</a></li>
        </ul>
    </noscript>
    </div>
    </div>

    <script>
        const posts = [
            { key: "post1", label: "1) Welcome and Tooltips", url: "./post1/index.html", fallbackUrl: "./post1/", sitePath: "/blog/post1/" },
            { key: "post2", label: "2) What even is CYOA?", url: "./post2/index.html", fallbackUrl: "./post2/", sitePath: "/blog/post2/" },
            { key: "post3", label: "3) Making the right stuff happen", url: "./post3/index.html", fallbackUrl: "./post3/", sitePath: "/blog/post3/" },
            { key: "post4", label: "4) campaignTrail_temp and you", url: "./post4/index.html", fallbackUrl: "./post4/", sitePath: "/blog/post4/" },
            { key: "post5", label: "5) Candidate Switching", url: "./post5/index.html", fallbackUrl: "./post5/", sitePath: "/blog/post5/" },
            { key: "post6", label: "6) VPs and how to use them", url: "./post6/index.html", fallbackUrl: "./post6/", sitePath: "/blog/post6/" },
            { key: "post8", label: "8) CYOA Helper Functions", url: "./post8/index.html", fallbackUrl: "./post8/", sitePath: "/blog/post8/" }
        ];

        function getDeploymentPrefix() {
            const marker = "/codes/cyoa";
            return window.location.pathname.includes(marker) ? marker : "";
        }

        function withDeploymentPrefix(absolutePath) {
            return getDeploymentPrefix() + absolutePath;
        }

        const tabBar = document.getElementById("tab-bar");
        const postTitle = document.getElementById("post-title");
        const postContent = document.getElementById("post-content");
        const postContentCache = new Map();

        function normalizeLoadedContent(container) {
            container.querySelectorAll('img[src^="/static/"]').forEach((img) => {
                img.setAttribute("src", ".." + img.getAttribute("src"));
            });

            container.querySelectorAll('a[href^="/static/"]').forEach((link) => {
                link.setAttribute("href", ".." + link.getAttribute("href"));
            });

            container.querySelectorAll('a[href="/blog"]').forEach((link) => {
                link.setAttribute("href", withDeploymentPrefix("/blog/"));
                link.textContent = "Back to top";
            });
        }

        async function getPostHtml(post) {
            const sourceUrls = [
                post.url,
                post.fallbackUrl,
                withDeploymentPrefix(post.sitePath),
                post.sitePath
            ];

            for (const sourceUrl of sourceUrls) {
                try {
                    const response = await fetch(sourceUrl, { cache: "no-store" });
                    if (!response.ok) {
                        continue;
                    }

                    const html = await response.text();
                    const doc = new DOMParser().parseFromString(html, "text/html");
                    if (doc.querySelector(".blog")) {
                        return html;
                    }
                } catch (error) {
                    // Try next source.
                }
            }

            throw new Error("Unable to load post");
        }

        function setActiveButton(key) {
            document.querySelectorAll(".tab-button").forEach((button) => {
                button.classList.toggle("active", button.dataset.postKey === key);
            });
        }

        async function loadPost(post) {
            setActiveButton(post.key);
            postTitle.textContent = post.label;
            postContent.className = "loading-text";
            postContent.innerHTML = "Loading post content...";

            try {
                let html = postContentCache.get(post.key);
                if (!html) {
                    html = await getPostHtml(post);
                    postContentCache.set(post.key, html);
                }

                const parser = new DOMParser();
                const doc = parser.parseFromString(html, "text/html");
                const sourceTitle = doc.querySelector("h1");
                const sourceBody = doc.querySelector(".blog");

                postTitle.textContent = sourceTitle ? sourceTitle.textContent.trim() : post.label;
                postContent.className = "";

                if (sourceBody) {
                    postContent.innerHTML = sourceBody.innerHTML;
                    normalizeLoadedContent(postContent);
                } else {
                    throw new Error("Post content not found");
                }

                window.location.hash = post.key;
                window.scrollTo({ top: 0, behavior: "smooth" });
            } catch (error) {
                postContent.className = "";
                postContent.innerHTML = "<p>Could not load this post in the reader.</p><p><a href=\"" + post.url + "\">Open local file</a></p><p><a href=\"" + withDeploymentPrefix(post.sitePath) + "\">Open blog route</a></p>";
            }
        }

        posts.forEach((post) => {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "tab-button";
            button.dataset.postKey = post.key;
            button.textContent = post.label;
            button.addEventListener("click", () => loadPost(post));
            tabBar.appendChild(button);
        });

        const initialKey = window.location.hash.replace("#", "");
        const initialPost = posts.find((post) => post.key === initialKey) || posts[0];
        loadPost(initialPost);

        window.addEventListener("hashchange", () => {
            const key = window.location.hash.replace("#", "");
            const matched = posts.find((post) => post.key === key);
            if (matched) {
                loadPost(matched);
            }
        });
    </script>
</body>
</html>
