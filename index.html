<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>womble</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Trebuchet MS', sans-serif;
            background: linear-gradient(135deg, #f8f6f6 0%, #ece8e8 100%);
            color: #3a3a3a;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: linear-gradient(180deg, #fff5f5 0%, #faf8f8 100%);
            border-right: 1px solid #d4a5a5;
            overflow-y: auto;
            padding: 20px;
            position: fixed;
            height: 100vh;
            box-shadow: 0 2px 8px rgba(139, 0, 0, 0.08);
        }

        .sidebar h3 {
            font-size: 12px;
            text-transform: uppercase;
            color: #8b3a3a;
            margin: 20px 0 10px 0;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .sidebar h3:first-child {
            margin-top: 0;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar li {
            margin: 5px 0;
        }

        .sidebar a {
            color: #a84a4a;
            text-decoration: none;
            font-size: 14px;
            display: block;
            padding: 5px 10px;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .sidebar a:hover {
            background: linear-gradient(90deg, #f0e5e5, #e8dcdc);
            color: #8b2e2e;
        }

        .sidebar a.active {
            background: linear-gradient(90deg, #ffe8e8, #ffd9d9);
            color: #8b2e2e;
            font-weight: 600;
        }

        .theme-list {
            display: grid;
            gap: 8px;
            margin-top: 8px;
        }

        .theme-button {
            border: 1px solid #d4a5a5;
            background: linear-gradient(90deg, #fff7f7, #f9efef);
            color: #8b3a3a;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.03em;
            padding: 8px 10px;
            text-align: left;
            transition: all 0.25s ease;
        }

        .theme-button:hover {
            background: linear-gradient(90deg, #f8ecec, #f2e3e3);
            border-color: #b98181;
        }

        .theme-button.active {
            background: linear-gradient(90deg, #ffe5e5, #ffd6d6);
            border-color: #a84a4a;
            color: #7a2c2c;
        }

        .content {
            flex: 1;
            margin-left: 250px;
            padding: 40px;
            max-width: 900px;
        }

        .main {
            background: linear-gradient(135deg, #fdfbfb 0%, #fcf8f8 100%);
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 1px 3px rgba(139, 0, 0, 0.1);
        }

        h1 {
            font-size: 2.5em;
            margin: 20px 0 30px 0;
            color: #7a2c2c;
            border-bottom: 3px solid #a84a4a;
            padding-bottom: 10px;
            font-family: 'Trebuchet MS', sans-serif;
        }

        h2 {
            font-size: 1.8em;
            margin: 30px 0 15px 0;
            color: #7a2c2c;
            padding-top: 10px;
            border-top: 1px solid #e8d4d4;
            font-family: 'Trebuchet MS', sans-serif;
        }

        h3 {
            font-size: 1.3em;
            margin: 20px 0 10px 0;
            color: #7a2c2c;
            font-family: 'Trebuchet MS', sans-serif;
        }

        h4 {
            font-size: 1.1em;
            margin: 15px 0 8px 0;
            color: #7a2c2c;
            font-family: 'Trebuchet MS', sans-serif;
        }

        p {
            margin: 15px 0;
            line-height: 1.8;
        }

        a {
            color: #a84a4a;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: all 0.3s;
        }

        a:hover {
            border-bottom-color: #a84a4a;
            color: #8b2e2e;
        }

        code {
            background: linear-gradient(90deg, #f5f0f0, #f2eded);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.9em;
            color: #b83a3a;
        }

        pre {
            background: linear-gradient(135deg, #2a1f1f 0%, #1f1515 100%);
            color: #e8d5d5;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            margin: 15px 0;
            line-height: 1.5;
        }

        pre code {
            background: transparent;
            color: #e8d5d5;
            padding: 0;
            border-radius: 0;
            font-family: 'Consolas', 'Courier New', monospace;
        }

        /* Highlight.js syntax highlighting theme */
        .hljs {
            background: linear-gradient(135deg, #2a1f1f 0%, #1f1515 100%);
            color: #e8d5d5;
        }

        .hljs-literal,
        .hljs-number {
            color: #ff9d76;
        }

        .hljs-string,
        .hljs-attr {
            color: #c9a373;
        }

        .hljs-function,
        .hljs-title {
            color: #e8b4a8;
        }

        .hljs-keyword {
            color: #ff7f7f;
        }

        .hljs-property {
            color: #d5a8a8;
        }

        .hljs-comment {
            color: #8b6464;
            font-style: italic;
        }

        .hljs-variable,
        .hljs-params {
            color: #e8d5d5;
        }

        .hljs-punctuation {
            color: #c9a9a9;
        }

        .hljs-built_in {
            color: #e8956f;
        }

        blockquote {
            border-left: 3px solid #a84a4a;
            padding-left: 15px;
            margin-left: 0;
            margin: 15px 0;
            color: #6a5a5a;
            font-style: italic;
        }

        ul, ol {
            margin: 15px 0;
            padding-left: 25px;
        }

        li {
            margin: 8px 0;
        }

        hr {
            border: none;
            border-top: 2px solid #e8d4d4;
            margin: 30px 0;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin: 15px 0;
        }

        th, td {
            border: 1px solid #d4a5a5;
            padding: 10px;
            text-align: left;
        }

        th {
            background: linear-gradient(90deg, #f5e8e8, #f0dede);
            font-weight: 600;
            color: #7a2c2c;
        }

        img {
            max-width: 100%;
            border-radius: 4px;
            margin: 15px 0;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e8d4d4;
        }

        .header-title h1 {
            margin: 0;
            border: none;
            padding: 0;
        }

        .search-box {
            padding: 8px 12px;
            border: 1px solid #d4a5a5;
            border-radius: 4px;
            width: 200px;
            font-size: 14px;
            background: linear-gradient(90deg, #fffbfb, #fff8f8);
        }

        .toc-toggle {
            display: none;
            background: linear-gradient(135deg, #a84a4a 0%, #8b3a3a 100%);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .toc-toggle:hover {
            background: linear-gradient(135deg, #8b3a3a 0%, #6f2e2e 100%);
            box-shadow: 0 2px 6px rgba(139, 0, 0, 0.2);
        }

        body.theme-metro {
            background: #ffcc44;
            color: #070707;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        body.theme-metro::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 10em;
            background: #66cc33;
            z-index: 2;
        }

        body.theme-metro .sidebar {
            width: 11.5em;
            background: #2299dd;
            border-right: none;
            box-shadow: none;
            padding-top: 10.8em;
            z-index: 3;
        }

        body.theme-metro .sidebar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 11.5em;
            height: 10em;
            background: #ff0000;
            z-index: 4;
        }

        body.theme-metro .sidebar::-webkit-scrollbar {
            width: 11px;
        }

        body.theme-metro .sidebar::-webkit-scrollbar-track {
            background: #157cb6;
        }

        body.theme-metro .sidebar::-webkit-scrollbar-thumb {
            background: #f2c541;
            border: 2px solid #157cb6;
        }

        body.theme-metro .sidebar h3 {
            color: #ffffff;
            letter-spacing: 0.12em;
            font-size: 11px;
            margin-top: 14px;
            text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.15);
        }

        body.theme-metro #toc-list {
            max-height: calc(100vh - 21.2em);
            overflow-y: auto;
            padding: 8px 6px 12px 4px;
            margin: 0;
            border-top: 1px solid rgba(255, 255, 255, 0.32);
            border-bottom: 1px solid rgba(0, 0, 0, 0.22);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.09), rgba(0, 0, 0, 0.09));
        }

        body.theme-metro #toc-list::-webkit-scrollbar {
            width: 9px;
        }

        body.theme-metro #toc-list::-webkit-scrollbar-track {
            background: #1b87c4;
        }

        body.theme-metro #toc-list::-webkit-scrollbar-thumb {
            background: #ffe58b;
            border: 1px solid #126f9f;
        }

        body.theme-metro .sidebar a {
            color: #222222;
            font-family: Tahoma, Arial, sans-serif;
            font-size: 82%;
            font-weight: 700;
            letter-spacing: 0.15em;
            border-radius: 0;
            padding: 10px 8px;
            border-bottom: none;
            text-transform: uppercase;
            border-left: 4px solid transparent;
            transition: color 0.2s ease, background 0.2s ease, border-color 0.2s ease;
            margin: 6px 0;
        }

        body.theme-metro .sidebar a:hover,
        body.theme-metro .sidebar a.active {
            background: rgba(0, 0, 0, 0.22);
            color: #ffffff;
            border-left-color: #ffe58b;
        }

        body.theme-metro .theme-button {
            font-family: Tahoma, Arial, sans-serif;
            border: 1px solid #333333;
            border-radius: 0;
            background: #ffcc44;
            color: #222222;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        body.theme-metro .theme-button:hover,
        body.theme-metro .theme-button.active {
            background: #333333;
            color: #ffffff;
            border-color: #ffffff;
        }

        body.theme-metro .content {
            margin-left: 14em;
            max-width: 53em;
            padding: 2.2em 2em 2em;
            overflow-x: visible;
        }

        body.theme-metro .main {
            background: transparent;
            box-shadow: none;
            border-radius: 0;
            padding: 2em;
            font-size: 85%;
            position: relative;
            z-index: auto;
        }

        body.theme-metro h1 {
            color: #ffffff;
            font-family: Arial, sans-serif;
            font-size: clamp(2.2rem, 6vw, 4.5rem);
            font-weight: normal;
            letter-spacing: 0.35em;
            border-bottom: none;
            margin: 0 0 0.7em;
            padding-bottom: 0;
            text-transform: uppercase;
        }

        body.theme-metro #content h1:first-of-type {
            position: relative;
            z-index: 5;
            max-width: none;
            margin: -1.75em -2em 0.5em -2.75em;
            padding: 1.5em 2em 0.5em 0;
            font-size: clamp(2.3rem, 7.1vw, 5.1rem);
            letter-spacing: 0.43em;
            line-height: 1;
            white-space: nowrap;
            overflow: visible;
            text-shadow: 0 1px 0 rgba(0, 0, 0, 0.08);
            pointer-events: auto;
            width: auto;
            padding-bottom: 0.5em;
            background: transparent;
        }

        body.theme-metro #content h1:first-of-type + * {
            margin-top: 0;
        }

        body.theme-metro #content h2,
        body.theme-metro #content h3,
        body.theme-metro #content h4,
        body.theme-metro #content h5,
        body.theme-metro #content h6 {
            scroll-margin-top: 2em;
        }

        body.theme-metro h2 {
            color: #333333;
            font-family: Arial, sans-serif;
            font-size: 200%;
            font-weight: normal;
            letter-spacing: 3px;
            border-top: none;
            margin: 0 0 0.5em;
            padding-top: 0;
            clear: both;
        }

        body.theme-metro h3 {
            color: #333333;
            font-family: Arial, sans-serif;
            font-size: 155%;
            font-weight: normal;
            letter-spacing: 1px;
            margin: 0 0 0.7em;
            clear: both;
        }

        body.theme-metro h4 {
            color: #322222;
            font-family: Arial, sans-serif;
            letter-spacing: 1px;
        }

        body.theme-metro p,
        body.theme-metro li {
            line-height: 1.5;
        }

        body.theme-plain {
            background: #ffffff;
            color: #111111;
            font-family: Georgia, 'Times New Roman', serif;
        }

        body.theme-plain .sidebar {
            width: 240px;
            background: #fafafa;
            border-right: 1px solid #c9d2da;
            box-shadow: none;
        }

        body.theme-plain .sidebar h3 {
            color: #003049;
            font-family: Georgia, 'Times New Roman', serif;
            text-transform: none;
            letter-spacing: 0;
            font-size: 12px;
        }

        body.theme-plain .sidebar a {
            color: #003049;
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 14px;
            border-radius: 0;
            border-bottom: 1px solid transparent;
        }

        body.theme-plain .sidebar a:hover,
        body.theme-plain .sidebar a.active {
            background: transparent;
            color: #001d2f;
            border-bottom-color: #003049;
        }

        body.theme-plain .theme-button {
            background: #ffffff;
            color: #003049;
            border: 1px solid #c9d2da;
            border-radius: 0;
            font-family: Georgia, 'Times New Roman', serif;
            font-weight: 400;
            letter-spacing: 0;
            text-transform: none;
        }

        body.theme-plain .theme-button:hover,
        body.theme-plain .theme-button.active {
            background: #f4f7fa;
            border-color: #003049;
            color: #001d2f;
        }

        body.theme-plain .content {
            max-width: 760px;
            padding: 48px 40px;
        }

        body.theme-plain .main {
            background: #ffffff;
            box-shadow: none;
            border-radius: 0;
            padding: 0;
        }

        body.theme-plain .header {
            border-bottom: 1px solid #c9d2da;
        }

        body.theme-plain .search-box {
            background: #ffffff;
            border: 1px solid #c9d2da;
            border-radius: 0;
            color: #111111;
            font-family: Georgia, 'Times New Roman', serif;
        }

        body.theme-plain .toc-toggle {
            background: #003049;
            border-radius: 0;
            color: #ffffff;
            font-family: Georgia, 'Times New Roman', serif;
            letter-spacing: 0;
        }

        body.theme-plain .toc-toggle:hover {
            background: #001d2f;
            box-shadow: none;
        }

        body.theme-plain h1,
        body.theme-plain h2,
        body.theme-plain h3,
        body.theme-plain h4 {
            color: #003049;
            font-family: Georgia, 'Times New Roman', serif;
            font-weight: 700;
            letter-spacing: 0;
            border-bottom: none;
            border-top: none;
        }

        body.theme-plain h1 {
            font-size: 2.2em;
            margin: 0 0 0.4em 0;
            padding-bottom: 0;
        }

        body.theme-plain h2 {
            font-size: 1.5em;
            margin: 1.4em 0 0.6em;
            padding-top: 0;
        }

        body.theme-plain h3 {
            font-size: 1.2em;
            margin: 1.2em 0 0.5em;
        }

        body.theme-plain h4 {
            font-size: 1.05em;
            margin: 1em 0 0.5em;
        }

        body.theme-plain p,
        body.theme-plain li {
            line-height: 1.7;
        }

        body.theme-plain a {
            color: #003049;
            border-bottom: 1px solid transparent;
        }

        body.theme-plain a:hover {
            color: #001d2f;
            border-bottom-color: #003049;
        }

        body.theme-plain code {
            background: #f3f5f7;
            color: #003049;
            border-radius: 0;
            font-family: Georgia, 'Times New Roman', serif;
        }

        body.theme-plain pre,
        body.theme-plain .hljs {
            background: #f7f7f7;
            color: #111111;
            border: 1px solid #d7dde3;
            border-radius: 0;
        }

        body.theme-plain .hljs-literal,
        body.theme-plain .hljs-number,
        body.theme-plain .hljs-string,
        body.theme-plain .hljs-attr,
        body.theme-plain .hljs-function,
        body.theme-plain .hljs-title,
        body.theme-plain .hljs-keyword,
        body.theme-plain .hljs-property,
        body.theme-plain .hljs-comment,
        body.theme-plain .hljs-variable,
        body.theme-plain .hljs-params,
        body.theme-plain .hljs-punctuation,
        body.theme-plain .hljs-built_in {
            color: inherit;
        }

        body.theme-plain blockquote {
            border-left: 2px solid #003049;
            color: #333333;
            font-style: italic;
        }

        body.theme-plain hr {
            border-top: 1px dotted #003049;
        }

        body.theme-plain table {
            border-collapse: collapse;
        }

        body.theme-plain th,
        body.theme-plain td {
            border: 1px solid #c9d2da;
        }

        body.theme-plain th {
            background: #f3f5f7;
            color: #003049;
        }

        body.theme-plain img {
            border-radius: 0;
        }

        body.theme-metro a {
            color: #aa3300;
            font-weight: bold;
            border-bottom: none;
        }

        body.theme-metro a:hover {
            color: #ffffcc;
        }

        body.theme-metro code {
            background: #ffe38f;
            color: #222222;
            border-radius: 0;
        }

        body.theme-metro pre,
        body.theme-metro .hljs {
            background: #1f1f1f;
            color: #f5f5f5;
            border-radius: 0;
        }

        body.theme-metro hr {
            border-top: 1px dotted #886633;
        }

        body.theme-metro blockquote {
            border-left-color: #aa3300;
            color: #333333;
        }

        body.theme-metro th,
        body.theme-metro td {
            border-color: #555555;
        }

        body.theme-metro th {
            background: #f2c541;
            color: #333333;
        }

        body.theme-metro .toc-toggle {
            border-radius: 0;
            background: #333333;
            color: #ffffff;
            box-shadow: none;
        }

        body.theme-metro .toc-toggle:hover {
            background: #111111;
        }

        @media screen and (max-width: 70em) {
            body.theme-metro {
                font-size: 120%;
            }

            body.theme-metro .content {
                margin-left: 11em;
                width: 36em;
            }

            body.theme-metro .main {
                padding: 2em;
            }

            body.theme-metro #content h1:first-of-type {
                letter-spacing: 0.33em;
                font-size: clamp(2rem, 8.1vw, 4.2rem);
            }

            body.theme-metro #content h1:first-of-type + * {
                margin-top: 8.4em;
            }

            body.theme-plain .content {
                padding: 32px 24px;
            }

            body.theme-plain .sidebar {
                width: 240px;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -250px;
                top: 0;
                height: 100vh;
                z-index: 999;
                transition: left 0.3s;
            }

            .sidebar.active {
                left: 0;
            }

            .content {
                margin-left: 0;
                width: 100%;
            }

            .toc-toggle {
                display: block;
            }

            .main {
                border-radius: 0;
            }

            body.theme-metro .sidebar {
                width: 11.5em;
                left: -11.5em;
                padding-top: 10.8em;
            }

            body.theme-metro .sidebar.active {
                left: 0;
            }

            body.theme-metro .content {
                margin-left: 0;
                width: 100%;
                max-width: 100%;
            }

            body.theme-metro .main {
                width: 100%;
                font-size: 100%;
                padding: 1.2em;
            }

            body.theme-metro #toc-list {
                max-height: calc(100vh - 22.2em);
            }

            body.theme-metro #content h1:first-of-type {
                font-size: clamp(1.85rem, 8.7vw, 3.2rem);
                letter-spacing: 0.23em;
            }

            body.theme-metro #content h1:first-of-type + * {
                margin-top: 8.4em;
            }

            body.theme-plain .sidebar {
                width: 240px;
                left: -240px;
            }

            body.theme-plain .sidebar.active {
                left: 0;
            }

            body.theme-plain .content {
                margin-left: 0;
                width: 100%;
                max-width: 100%;
                padding: 24px 16px;
            }

            body.theme-plain .main {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h3>Navigation</h3>
            <ul id="toc-list"></ul>

            <h3>Themes</h3>
            <div class="theme-list" role="group" aria-label="Theme selector">
                <button class="theme-button" data-theme="classic" aria-pressed="true">Classic</button>
                <button class="theme-button" data-theme="metro" aria-pressed="false">Metro</button>
                <button class="theme-button" data-theme="plain" aria-pressed="false">Plain</button>
            </div>
        </div>

        <div class="content">
            <button class="toc-toggle" id="toc-toggle">☰ Menu</button>
            <div class="main" id="content"></div>
        </div>
    </div>

    <script>
        const THEME_STORAGE_KEY = 'womble-theme';

        function applyTheme(themeName) {
            const theme = themeName === 'metro' || themeName === 'plain' ? themeName : 'classic';
            document.body.classList.toggle('theme-metro', theme === 'metro');
            document.body.classList.toggle('theme-plain', theme === 'plain');

            document.querySelectorAll('.theme-button').forEach((button) => {
                const isActive = button.dataset.theme === theme;
                button.classList.toggle('active', isActive);
                button.setAttribute('aria-pressed', isActive ? 'true' : 'false');
            });

            try {
                localStorage.setItem(THEME_STORAGE_KEY, theme);
            } catch (error) {
                console.warn('Theme preference could not be saved.', error);
            }
        }

        function initializeThemes() {
            document.querySelectorAll('.theme-button').forEach((button) => {
                button.addEventListener('click', () => {
                    applyTheme(button.dataset.theme);
                });
            });

            let savedTheme = 'classic';
            try {
                savedTheme = localStorage.getItem(THEME_STORAGE_KEY) || 'classic';
            } catch (error) {
                console.warn('Theme preference could not be loaded.', error);
            }

            applyTheme(savedTheme);
        }

        // fetch and render the README
        async function loadReadme() {
            try {
                const response = await fetch('./README.md');
                const markdown = await response.text();
                
                // configure marked options with highlight.js
                marked.setOptions({
                    breaks: true,
                    gfm: true,
                    highlight: function(code, lang) {
                        if (lang && hljs.getLanguage(lang)) {
                            try {
                                return hljs.highlight(code, { language: lang }).value;
                            } catch (e) {}
                        }
                        return hljs.highlightAuto(code).value;
                    }
                });

                // render markdown to HTML
                const html = marked.parse(markdown);
                const cleanHtml = DOMPurify.sanitize(html);
                
                // insert into page
                const contentDiv = document.getElementById('content');
                contentDiv.innerHTML = cleanHtml;

                // highlight code blocks
                contentDiv.querySelectorAll('pre code').forEach((el) => {
                    hljs.highlightElement(el);
                });

                // add IDs before building TOC so links always match heading anchors
                addHeadingIds();

                // generate TOC
                generateTableOfContents();

                // wire up click handlers after TOC links exist
                attachSidebarLinkHandlers();

                // if page opened with a hash, scroll once content is ready
                scrollToHashSection();
                
            } catch (error) {
                console.error('Error loading README:', error);
                document.getElementById('content').innerHTML = 
                    '<h2>Error loading README</h2><p>Could not fetch README.md file.</p>';
            }
        }

        function slugifyHeading(text) {
            return text
                .toLowerCase()
                .replace(/[^\w\s-]/g, '')
                .trim()
                .replace(/\s+/g, '-');
        }

        function generateTableOfContents() {
            const contentDiv = document.getElementById('content');
            const headings = contentDiv.querySelectorAll('h1, h2, h3, h4');
            const tocList = document.getElementById('toc-list');
            tocList.innerHTML = '';

            headings.forEach((heading) => {
                const level = parseInt(heading.tagName[1]);
                const li = document.createElement('li');
                li.style.marginLeft = Math.max(0, (level - 1) * 15) + 'px';
                
                const a = document.createElement('a');
                a.href = '#' + (heading.id || slugifyHeading(heading.textContent));
                a.textContent = heading.textContent;
                
                li.appendChild(a);
                tocList.appendChild(li);
            });
        }

        function addHeadingIds() {
            const contentDiv = document.getElementById('content');
            const headings = contentDiv.querySelectorAll('h1, h2, h3, h4, h5, h6');
            const usedIds = new Set();
            
            headings.forEach((heading) => {
                let baseId = heading.id || slugifyHeading(heading.textContent);
                if (!baseId) {
                    baseId = 'section';
                }

                let uniqueId = baseId;
                let counter = 2;
                while (usedIds.has(uniqueId)) {
                    uniqueId = baseId + '-' + counter;
                    counter += 1;
                }

                heading.id = uniqueId;

                usedIds.add(heading.id);
            });
        }

        function attachSidebarLinkHandlers() {
            // handle TOC navigation so all entries scroll reliably
            document.querySelectorAll('.sidebar a').forEach((link) => {
                link.addEventListener('click', function(event) {
                    event.preventDefault();

                    const targetId = this.getAttribute('href').slice(1);
                    const targetHeading = document.getElementById(targetId);

                    if (targetHeading) {
                        history.replaceState(null, '', '#' + targetId);
                        targetHeading.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }

                    document.querySelector('.sidebar').classList.remove('active');
                });
            });
        }

        function scrollToHashSection() {
            const hash = window.location.hash;
            if (!hash) {
                return;
            }

            const targetHeading = document.getElementById(hash.slice(1));
            if (targetHeading) {
                targetHeading.scrollIntoView({ behavior: 'auto', block: 'start' });
            }
        }

        // mobile menu toggle
        document.getElementById('toc-toggle').addEventListener('click', function() {
            document.querySelector('.sidebar').classList.toggle('active');
        });

        // update active link in sidebar based on scroll position
        window.addEventListener('scroll', function() {
            const headings = document.querySelectorAll('#content h1, #content h2, #content h3, #content h4');
            const links = document.querySelectorAll('.sidebar a');
            
            let currentHeading = null;
            headings.forEach((heading) => {
                if (heading.offsetTop - window.innerHeight / 3 < window.scrollY) {
                    currentHeading = heading;
                }
            });

            links.forEach(link => {
                link.classList.remove('active');
                if (currentHeading && link.getAttribute('href') === '#' + currentHeading.id) {
                    link.classList.add('active');
                }
            });
        });

        // initialize theme controls and apply preferred theme
        initializeThemes();

        // load README
        loadReadme();
    </script>
</body>
</html>
